<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <!-- Blob background (teal tinted) -->
  <path d="M55,270 C10,240 -5,158 20,92 C45,26 140,0 242,4 C344,8 448,52 468,120 C488,188 460,254 412,274 C364,294 262,310 168,306 C74,302 100,300 55,270Z" fill="#D2F3F0"/>

  <!-- Floating: Patient ID card (top left) -->
  <rect x="14" y="22" width="130" height="90" rx="12" fill="white" opacity="0.97"/>
  <!-- Card header stripe -->
  <rect x="14" y="22" width="130" height="24" rx="12" fill="#0EA5A0"/>
  <rect x="14" y="34" width="130" height="12" fill="#0EA5A0"/>
  <text x="28" y="39" font-family="sans-serif" font-size="10" font-weight="700" fill="white">Ficha de Paciente</text>
  <!-- Photo placeholder -->
  <rect x="24" y="52" width="34" height="40" rx="6" fill="#CCFBF1"/>
  <circle cx="41" cy="62" r="8" fill="#0EA5A0" opacity="0.5"/>
  <path d="M29,91 C29,80 34,76 41,76 C48,76 53,80 53,91" fill="#0EA5A0" opacity="0.35"/>
  <!-- Info lines -->
  <rect x="65" y="54" width="68" height="7" rx="3" fill="#0EA5A0" opacity="0.25"/>
  <rect x="65" y="66" width="52" height="6" rx="3" fill="#D8E5F2"/>
  <rect x="65" y="77" width="60" height="6" rx="3" fill="#D8E5F2"/>
  <!-- Badge -->
  <rect x="65" y="90" width="62" height="16" rx="5" fill="#CCFBF1"/>
  <text x="72" y="102" font-family="sans-serif" font-size="9" font-weight="700" fill="#0EA5A0">Activo ✓</text>

  <!-- Floating: Clipboard / checklist (top right) -->
  <rect x="334" y="18" width="130" height="96" rx="12" fill="white" opacity="0.97"/>
  <!-- Clipboard top clip -->
  <rect x="374" y="14" width="50" height="14" rx="7" fill="#0EA5A0"/>
  <rect x="389" y="11" width="20" height="9" rx="4" fill="#0D2340"/>
  <!-- Checklist items -->
  <text x="350" y="46" font-family="sans-serif" font-size="11" font-weight="700" fill="#0D2340">Registro</text>
  <!-- Item 1: checked -->
  <rect x="350" y="54" width="14" height="14" rx="3" fill="#0EA5A0"/>
  <path d="M353,61 L357,65 L363,57" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="369" y="58" width="80" height="6" rx="3" fill="#D8E5F2"/>
  <!-- Item 2: checked -->
  <rect x="350" y="74" width="14" height="14" rx="3" fill="#0EA5A0"/>
  <path d="M353,81 L357,85 L363,77" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="369" y="78" width="65" height="6" rx="3" fill="#D8E5F2"/>
  <!-- Item 3: pending -->
  <rect x="350" y="94" width="14" height="14" rx="3" fill="white" stroke="#D8E5F2" stroke-width="1.5"/>
  <rect x="369" y="98" width="72" height="6" rx="3" fill="#D8E5F2" opacity="0.6"/>

  <!-- Desk -->
  <rect x="40" y="220" width="400" height="52" rx="10" fill="#9CD8D4" opacity="0.4"/>
  <rect x="40" y="220" width="400" height="9" rx="4" fill="#7BCBC6" opacity="0.5"/>

  <!-- ── MAIN FIGURE (female nurse/receptionist, centered slightly left) ── -->
  <!-- Body - white coat -->
  <path d="M168,172 C160,174 154,188 150,220 L252,220 C248,188 242,174 234,172 Z" fill="white"/>
  <!-- Lapels -->
  <path d="M196,172 L201,198 L201,220" fill="#E0F7F6"/>
  <path d="M206,172 L201,198 L201,220" fill="#E0F7F6"/>
  <!-- Inner shirt / scrubs hints -->
  <rect x="195" y="172" width="12" height="30" rx="2" fill="#CCFBF1"/>
  <!-- Neck -->
  <rect x="196" y="152" width="16" height="22" rx="5" fill="#F5CBA7"/>
  <!-- Head -->
  <circle cx="204" cy="126" r="31" fill="#F5CBA7"/>
  <!-- Hair (dark brown, up/bun style for nurse) -->
  <path d="M176,112 Q174,84 192,72 Q204,64 216,72 Q234,84 232,112" fill="#3D1A00"/>
  <!-- Bun on top -->
  <ellipse cx="204" cy="68" rx="16" ry="12" fill="#3D1A00"/>
  <!-- Bun highlight -->
  <ellipse cx="204" cy="65" rx="8" ry="5" fill="#5C2A05" opacity="0.5"/>
  <!-- Eyes -->
  <circle cx="195" cy="128" r="3.5" fill="#2B1505"/>
  <circle cx="213" cy="128" r="3.5" fill="#2B1505"/>
  <circle cx="196" cy="127" r="1.3" fill="white"/>
  <circle cx="214" cy="127" r="1.3" fill="white"/>
  <!-- Eyebrows -->
  <path d="M191,122 Q195,119 199,122" stroke="#3D1A00" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M209,122 Q213,119 217,122" stroke="#3D1A00" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M196,140 Q204,148 212,140" stroke="#CC7A55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="190" cy="137" r="7" fill="#F0A070" opacity="0.2"/>
  <circle cx="218" cy="137" r="7" fill="#F0A070" opacity="0.2"/>
  <!-- Nose -->
  <path d="M202,133 L200,138 L208,138" stroke="#D4855A" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stethoscope around neck -->
  <path d="M185,158 Q178,168 180,182 Q182,190 190,192" stroke="#0EA5A0" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M223,158 Q230,168 228,182 Q226,190 218,192" stroke="#0EA5A0" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="204" cy="196" r="8" fill="#0EA5A0"/>
  <circle cx="204" cy="196" r="4" fill="#0D2340"/>
  <!-- Left arm (writing/form) -->
  <path d="M168,178 Q150,185 144,205" stroke="white" stroke-width="15" fill="none" stroke-linecap="round"/>
  <!-- Right arm (raised, holding pen/pointing) -->
  <path d="M234,178 Q252,172 262,160 Q268,150 264,140" stroke="white" stroke-width="15" fill="none" stroke-linecap="round"/>
  <circle cx="264" cy="137" r="11" fill="#F5CBA7"/>
  <!-- Pen in hand -->
  <path d="M270,128 L280,118" stroke="#0D2340" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M280,118 L283,115" stroke="#0EA5A0" stroke-width="2" stroke-linecap="round"/>

  <!-- Laptop / tablet on desk in front -->
  <rect x="152" y="203" width="110" height="18" rx="5" fill="#0EA5A0" opacity="0.85"/>
  <!-- Medical cross -->
  <rect x="198" y="207" width="18" height="5" rx="2" fill="white" opacity="0.8"/>
  <rect x="204" y="201" width="5" height="18" rx="2" fill="white" opacity="0.8"/>

  <!-- Patient folder on desk right -->
  <rect x="278" y="196" width="70" height="26" rx="6" fill="#0EA5A0" opacity="0.2"/>
  <rect x="278" y="196" width="70" height="8" rx="4" fill="#0EA5A0" opacity="0.4"/>
  <rect x="284" y="208" width="50" height="5" rx="2" fill="#0EA5A0" opacity="0.3"/>
  <rect x="284" y="215" width="36" height="4" rx="2" fill="#0EA5A0" opacity="0.2"/>

  <!-- Floating search / form icon bottom right -->
  <circle cx="428" cy="185" r="32" fill="#0EA5A0" opacity="0.12"/>
  <circle cx="428" cy="185" r="24" fill="white"/>
  <circle cx="424" cy="181" r="9" stroke="#0EA5A0" stroke-width="3" fill="none"/>
  <line x1="430" y1="187" x2="438" y2="195" stroke="#0EA5A0" stroke-width="3" stroke-linecap="round"/>
</svg>

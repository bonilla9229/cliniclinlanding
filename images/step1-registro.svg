<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <!-- Blob background (purple-blue tinted) -->
  <path d="M55,270 C10,240 -5,158 20,92 C45,26 140,0 242,4 C344,8 448,52 468,120 C488,188 460,254 412,274 C364,294 262,310 168,306 C74,302 100,300 55,270Z" fill="#D6E4F7"/>

  <!-- Floating: Sign-up form card (top left) -->
  <rect x="14" y="18" width="132" height="100" rx="12" fill="white" opacity="0.97"/>
  <!-- Card header -->
  <rect x="14" y="18" width="132" height="24" rx="12" fill="#1A73C8"/>
  <rect x="14" y="30" width="132" height="12" fill="#1A73C8"/>
  <text x="30" y="35" font-family="sans-serif" font-size="9.5" font-weight="700" fill="white">Crear cuenta</text>
  <!-- ClinicLin logo dot on header -->
  <circle cx="134" cy="30" r="5" fill="white" opacity="0.25"/>
  <!-- Form fields -->
  <text x="24" y="58" font-family="sans-serif" font-size="8" fill="#8FA5B8">Nombre de la clínica</text>
  <rect x="24" y="61" width="108" height="14" rx="4" fill="#F4F8FD" stroke="#D8E5F2" stroke-width="1"/>
  <text x="28" y="72" font-family="sans-serif" font-size="8" fill="#0D2340" opacity="0.6">Mi Clínica...</text>
  <!-- E-mail field -->
  <text x="24" y="84" font-family="sans-serif" font-size="8" fill="#8FA5B8">Correo electrónico</text>
  <rect x="24" y="87" width="108" height="14" rx="4" fill="#F4F8FD" stroke="#1A73C8" stroke-width="1.5"/>
  <text x="28" y="98" font-family="sans-serif" font-size="8" fill="#1A73C8" opacity="0.8">clinica@ejemplo.com</text>
  <!-- Submit button -->
  <rect x="24" y="106" width="108" height="16" rx="6" fill="#1A73C8"/>
  <text x="78" y="118" font-family="sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">Comenzar gratis →</text>

  <!-- Floating: Confirmation check badge (top right) -->
  <rect x="336" y="14" width="126" height="60" rx="12" fill="white" opacity="0.97"/>
  <circle cx="362" cy="44" r="18" fill="#E8F3FD"/>
  <circle cx="362" cy="44" r="13" fill="#1A73C8"/>
  <!-- Checkmark -->
  <path d="M355,44 L360,49 L370,38" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="385" y="38" font-family="sans-serif" font-size="10" font-weight="700" fill="#0D2340">¡Listo!</text>
  <text x="385" y="52" font-family="sans-serif" font-size="8" fill="#8FA5B8">Cuenta creada</text>
  <text x="385" y="64" font-family="sans-serif" font-size="8" fill="#0EA5A0" font-weight="600">en 5 minutos</text>

  <!-- Floating: Security lock badge (top right lower) -->
  <rect x="350" y="88" width="112" height="36" rx="10" fill="white" opacity="0.97"/>
  <circle cx="372" cy="106" r="12" fill="#CCFBF1"/>
  <!-- Lock icon -->
  <rect x="367" y="106" width="10" height="8" rx="2" fill="#0EA5A0"/>
  <path d="M369,106 Q369,100 372,100 Q375,100 375,106" stroke="#0EA5A0" stroke-width="2" fill="none"/>
  <text x="388" y="103" font-family="sans-serif" font-size="8.5" font-weight="700" fill="#0D2340">100% seguro</text>
  <text x="388" y="115" font-family="sans-serif" font-size="7.5" fill="#8FA5B8">Datos cifrados SSL</text>

  <!-- Desk -->
  <rect x="40" y="220" width="400" height="52" rx="10" fill="#A3C4E8" opacity="0.3"/>
  <rect x="40" y="220" width="400" height="9" rx="4" fill="#88B0D8" opacity="0.35"/>

  <!-- ── MAIN FIGURE (young woman, light skin, signing up) ── -->
  <!-- White coat / blouse body -->
  <path d="M168,172 C160,174 154,188 150,220 L256,220 C252,188 246,174 238,172 Z" fill="white"/>
  <!-- Blouse accent color (light blue collar/inner) -->
  <path d="M199,172 L202,200 L202,220" fill="#D6E9FA"/>
  <path d="M207,172 L202,200 L202,220" fill="#D6E9FA"/>
  <!-- Blue shirt visible at lapels -->
  <path d="M196,172 L202,186" stroke="#1A73C8" stroke-width="5" stroke-linecap="round"/>
  <path d="M210,172 L202,186" stroke="#1A73C8" stroke-width="5" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="197" y="152" width="16" height="22" rx="5" fill="#F5CBA7"/>
  <!-- Head -->
  <circle cx="205" cy="126" r="31" fill="#F5CBA7"/>
  <!-- Hair — long, dark, loose (friendly / casual) -->
  <path d="M176,112 Q172,80 190,68 Q203,60 218,68 Q236,80 234,112" fill="#2C1A0E"/>
  <!-- Side hair left -->
  <path d="M176,112 Q170,132 174,158 Q176,168 182,172" fill="#2C1A0E"/>
  <!-- Side hair right -->
  <path d="M234,112 Q240,132 236,158 Q234,168 228,172" fill="#2C1A0E"/>
  <!-- Hair highlight -->
  <path d="M192,70 Q205,62 218,70 Q210,68 205,68 Q200,68 192,70Z" fill="#4A2E15" opacity="0.5"/>
  <!-- Ears -->
  <ellipse cx="175" cy="128" rx="5" ry="7" fill="#EDB97A"/>
  <ellipse cx="235" cy="128" rx="5" ry="7" fill="#EDB97A"/>
  <!-- Eyes -->
  <ellipse cx="195" cy="127" rx="4" ry="4.5" fill="#2B1505"/>
  <ellipse cx="215" cy="127" rx="4" ry="4.5" fill="#2B1505"/>
  <circle cx="196" cy="126" r="1.5" fill="white"/>
  <circle cx="216" cy="126" r="1.5" fill="white"/>
  <!-- Eyebrows (arched, feminine) -->
  <path d="M189,120 Q195,116 200,120" stroke="#2C1A0E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M210,120 Q215,116 220,120" stroke="#2C1A0E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Smile (happy) -->
  <path d="M196,140 Q205,150 214,140" stroke="#C06040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Tooth hint -->
  <path d="M199,143 Q205,149 211,143" fill="white" opacity="0.7"/>
  <!-- Cheeks -->
  <circle cx="189" cy="137" r="8" fill="#F0A070" opacity="0.22"/>
  <circle cx="221" cy="137" r="8" fill="#F0A070" opacity="0.22"/>
  <!-- Nose -->
  <path d="M202,133 L200,138 L210,138" stroke="#D4855A" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left arm typing on laptop -->
  <path d="M168,178 Q148,188 142,210" stroke="white" stroke-width="15" fill="none" stroke-linecap="round"/>
  <circle cx="142" cy="213" r="11" fill="#F5CBA7"/>
  <!-- Right arm raised, excited / waving -->
  <path d="M238,178 Q258,170 270,152 Q278,140 274,128" stroke="white" stroke-width="15" fill="none" stroke-linecap="round"/>
  <circle cx="274" cy="125" r="11" fill="#F5CBA7"/>
  <!-- Fingers suggestion (right hand) -->
  <path d="M268,118 Q272,112 278,116" stroke="#F5CBA7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M274,115 Q276,108 282,112" stroke="#F5CBA7" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Laptop on desk -->
  <rect x="150" y="201" width="116" height="20" rx="6" fill="#1A73C8" opacity="0.9"/>
  <!-- Screen with sign-up form preview -->
  <rect x="156" y="204" width="104" height="13" rx="3" fill="#0D2340"/>
  <!-- Mini form lines on laptop screen -->
  <rect x="162" y="206" width="55" height="4" rx="2" fill="white" opacity="0.18"/>
  <rect x="162" y="212" width="40" height="3" rx="1.5" fill="#1A73C8" opacity="0.5"/>
  <!-- Blue submit-button hint on screen -->
  <rect x="220" y="206" width="30" height="8" rx="3" fill="#1A73C8" opacity="0.7"/>
  <!-- Medical cross on lid -->
  <rect x="200" y="200" width="14" height="4" rx="2" fill="white" opacity="0.65"/>
  <rect x="206" y="196" width="4" height="14" rx="2" fill="white" opacity="0.65"/>

  <!-- Floating: docs / brochure on desk right -->
  <rect x="280" y="198" width="66" height="24" rx="6" fill="#E8F3FD" stroke="#D8E5F2" stroke-width="1"/>
  <rect x="286" y="204" width="52" height="5" rx="2" fill="#1A73C8" opacity="0.3"/>
  <rect x="286" y="212" width="38" height="4" rx="2" fill="#D8E5F2"/>

  <!-- Floating: star rating bottom left -->
  <rect x="42" y="170" width="108" height="42" rx="10" fill="white" opacity="0.95"/>
  <text x="58" y="188" font-family="sans-serif" font-size="9" font-weight="700" fill="#0D2340">+500 clínicas</text>
  <!-- Stars -->
  <text x="52" y="204" font-family="sans-serif" font-size="13" fill="#F59E0B">★★★★★</text>
</svg>
